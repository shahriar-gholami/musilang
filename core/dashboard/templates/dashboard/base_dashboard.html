{% extends "base.html" %}
{% block style %}
<style>
 :root {
    --main-color-one: #3a3b9c;
    --main-color-one-shadow: #3a3b9c31;
    --main-color-one-hover: #2a2b82;

    --main-color-two: #FFD100;
    --main-color-two-shadow: #FFD10031;
    --main-color-two-hover: #d8b103;

    --main-color-three: #45147e;
    --main-color-three-shadow: #45147e31;
    --main-color-three-hover: #320a60;

    --dashboard-bg: #f5f6ff;
    --dashboard-card-bg: #ffffff;
    --dashboard-text: #1f2937;
    --dashboard-muted: #6b7280;
    --dashboard-border: rgba(58, 59, 156, 0.12);
}

/* Dashboard Layout */
.dashboard-page {
    padding: 40px 0;
    background:
        radial-gradient(circle at top right, var(--main-color-one-shadow), transparent 0%),
        radial-gradient(circle at bottom left, var(--main-color-three-shadow), transparent 0%),
        var(--dashboard-bg);
    min-height: 100vh;
}

.dashboard-layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
    align-items: start;
}

/* Sidebar */
.dashboard-sidebar {
    position: sticky;
    top: 24px;
    background: linear-gradient(180deg, var(--main-color-one), var(--main-color-three));
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 22px;
    padding: 20px;
    box-shadow: 0 18px 45px rgba(58, 59, 156, 0.22);
}

.dashboard-user-box {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 18px;
    margin-bottom: 18px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.18);
}

.dashboard-user-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--main-color-two);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--main-color-three);
    font-weight: 800;
    font-size: 20px;
    flex-shrink: 0;
}

.dashboard-user-info strong {
    color: #fff;
    font-size: 15px;
}

.dashboard-user-info span {
    color: rgba(255, 255, 255, 0.72);
    font-size: 13px;
}

.dashboard-menu {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.dashboard-menu-item {
    display: flex;
    align-items: center;
    min-height: 44px;
    padding: 10px 14px;
    border-radius: 14px;
    color: rgba(255, 255, 255, 0.82);
    text-decoration: none;
    font-size: 14px;
    transition: all 0.2s ease;
}

.dashboard-menu-item:hover {
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
}

.dashboard-menu-item.active {
    background: var(--main-color-two);
    color: var(--main-color-three);
    font-weight: 800;
    box-shadow: 0 10px 24px var(--main-color-two-shadow);
}

.dashboard-menu-logout {
    margin-top: 12px;
    color: #ffd6d6;
}

.dashboard-menu-logout:hover {
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
}

/* Main Content */
.dashboard-main {
    min-width: 0;
}

/* این بخش مشکل خوانایی عنوان سفید را حل می‌کند */
.dashboard-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 24px;
    padding: 22px 24px;
    border-radius: 22px;
    background: linear-gradient(135deg, var(--main-color-one), var(--main-color-three));
    box-shadow: 0 18px 45px rgba(58, 59, 156, 0.18);
}

.dashboard-header h1 {
    color: #fff;
    font-size: 28px;
    font-weight: 800;
    margin: 0 0 8px;
}

.dashboard-header p {
    color: rgba(255, 255, 255, 0.78);
    margin: 0;
    font-size: 14px;
}

/* Cards */
.dashboard-cards {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 16px;
    margin-bottom: 24px;
}

.dashboard-card {
    background: var(--dashboard-card-bg);
    border: 1px solid var(--dashboard-border);
    border-radius: 20px;
    padding: 20px;
    color: var(--dashboard-text);
    box-shadow: 0 12px 34px rgba(58, 59, 156, 0.08);
}

.dashboard-card span {
    display: block;
    color: var(--dashboard-muted);
    font-size: 13px;
    margin-bottom: 10px;
}

.dashboard-card strong {
    color: var(--main-color-one);
    font-size: 22px;
    font-weight: 800;
}

.dashboard-card h3 {
    color: var(--dashboard-text);
    font-size: 18px;
    margin: 0 0 10px;
}

.dashboard-card p {
    color: var(--dashboard-muted);
    margin: 0 0 12px;
    line-height: 1.8;
}

/* Sections */
.dashboard-section {
    background: var(--dashboard-card-bg);
    border: 1px solid var(--dashboard-border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 12px 34px rgba(58, 59, 156, 0.08);
}

.dashboard-section h2 {
    color: var(--main-color-one);
    font-size: 20px;
    font-weight: 800;
    margin: 0 0 18px;
}

.dashboard-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
}

.dashboard-section-header h2 {
    margin: 0;
}

.dashboard-section-header a {
    color: var(--main-color-one);
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
}

.dashboard-section-header a:hover {
    color: var(--main-color-one-hover);
}

/* Lists */
.dashboard-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.dashboard-list-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 14px;
    border-radius: 16px;
    background: #f8f8ff;
    border: 1px solid var(--dashboard-border);
    color: var(--dashboard-text);
    text-decoration: none;
    transition: all 0.2s ease;
}

.dashboard-list-item:hover {
    background: var(--main-color-one-shadow);
    transform: translateY(-2px);
}

.dashboard-list-item img {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    object-fit: cover;
    flex-shrink: 0;
}

.dashboard-list-item div {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-left: auto;
}

.dashboard-list-item strong {
    color: var(--dashboard-text);
    font-size: 15px;
}

.dashboard-list-item span {
    color: var(--dashboard-muted);
    font-size: 13px;
}

/* Grid Cards */
.dashboard-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 16px;
}

.dashboard-music-card {
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f8f8ff;
    border: 1px solid var(--dashboard-border);
    border-radius: 18px;
    padding: 14px;
    color: var(--dashboard-text);
    text-decoration: none;
    transition: all 0.2s ease;
}

.dashboard-music-card:hover {
    transform: translateY(-3px);
    background: var(--main-color-one-shadow);
}

.dashboard-music-card img {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 14px;
    object-fit: cover;
}

.dashboard-music-card strong {
    color: var(--dashboard-text);
    font-size: 15px;
}

.dashboard-music-card span {
    color: var(--dashboard-muted);
    font-size: 13px;
}

/* Empty State */
.dashboard-empty {
    padding: 24px;
    border-radius: 16px;
    background: #f8f8ff;
    border: 1px dashed rgba(58, 59, 156, 0.28);
    color: var(--dashboard-muted);
    text-align: center;
    font-size: 14px;
}

/* Forms */
.dashboard-form {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.dashboard-form p {
    margin: 0;
}

.dashboard-form label {
    display: block;
    color: var(--dashboard-text);
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
}

.dashboard-input,
.dashboard-textarea,
.dashboard-form input[type="text"],
.dashboard-form input[type="email"],
.dashboard-form input[type="password"],
.dashboard-form input[type="number"],
.dashboard-form input[type="url"],
.dashboard-form textarea,
.dashboard-form select {
    width: 100%;
    min-height: 46px;
    padding: 12px 14px;
    border-radius: 14px;
    border: 1px solid rgba(58, 59, 156, 0.18);
    background: #fff;
    color: var(--dashboard-text);
    outline: none;
    font-size: 14px;
    transition: all 0.2s ease;
}

.dashboard-textarea,
.dashboard-form textarea {
    min-height: 130px;
    resize: vertical;
}

.dashboard-input:focus,
.dashboard-textarea:focus,
.dashboard-form input:focus,
.dashboard-form textarea:focus,
.dashboard-form select:focus {
    border-color: var(--main-color-one);
    box-shadow: 0 0 0 4px var(--main-color-one-shadow);
}

.dashboard-form input::placeholder,
.dashboard-form textarea::placeholder {
    color: #9ca3af;
}

.dashboard-form ul {
    margin: 8px 0 0;
    padding: 0;
    list-style: none;
}

.dashboard-form li {
    color: var(--dashboard-text);
    margin-bottom: 8px;
}

.dashboard-form input[type="checkbox"] {
    width: auto;
    margin-left: 8px;
    accent-color: var(--main-color-one);
}

.dashboard-form .errorlist {
    margin: 0 0 8px;
    padding: 0;
    list-style: none;
}

.dashboard-form .errorlist li {
    color: #dc2626;
    font-size: 13px;
}

/* Buttons */
.dashboard-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    padding: 10px 18px;
    border: 0;
    border-radius: 14px;
    background: var(--main-color-one);
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s ease;
}

.dashboard-btn:hover {
    transform: translateY(-2px);
    background: var(--main-color-one-hover);
    color: #fff;
    box-shadow: 0 10px 24px var(--main-color-one-shadow);
}

.dashboard-btn-secondary {
    background: var(--main-color-two);
    color: var(--main-color-three);
}

.dashboard-btn-secondary:hover {
    background: var(--main-color-two-hover);
    color: var(--main-color-three);
    box-shadow: 0 10px 24px var(--main-color-two-shadow);
}

/* Status Texts */
.text-success {
    color: #16a34a !important;
}

.text-danger {
    color: #dc2626 !important;
}

.text-warning {
    color: #d97706 !important;
}

/* Responsive */
@media (max-width: 1199px) {
    .dashboard-cards,
    .dashboard-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
    }
}

@media (max-width: 991px) {
    .dashboard-layout {
        grid-template-columns: 1fr;
    }

    .dashboard-sidebar {
        position: static;
    }

    .dashboard-menu {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .dashboard-cards,
    .dashboard-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .dashboard-header {
        align-items: flex-start;
        flex-direction: column;
    }
}

@media (max-width: 575px) {
    .dashboard-page {
        padding: 24px 0;
    }

    .dashboard-sidebar,
    .dashboard-section,
    .dashboard-card,
    .dashboard-header {
        border-radius: 16px;
    }

    .dashboard-menu {
        grid-template-columns: 1fr;
    }

    .dashboard-cards,
    .dashboard-grid {
        grid-template-columns: 1fr;
    }

    .dashboard-list-item {
        align-items: flex-start;
        flex-direction: column;
    }

    .dashboard-list-item img {
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
    }

    .dashboard-header h1 {
        font-size: 24px;
    }
}

</style>
{% endblock %}
{% block content %}
<section class="dashboard-page">
    <div class="container">
        <div class="dashboard-layout">
            {% include "dashboard/includes/sidebar.html" %}

            <main class="dashboard-main">
                {% block dashboard_content %}{% endblock %}
            </main>
        </div>
    </div>
</section>
{% endblock %}
